name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────
  # Job 1 — Lint (ruff + mypy)
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff check
        run: ruff check services/ tests/

      - name: mypy check
        run: |
          mypy services/rag-api/src \
               services/quota-service/src \
               services/embedding-worker/src \
               --ignore-missing-imports \
               --no-error-summary

  # ──────────────────────────────────────────────
  # Job 2 — Unit Tests (matrix per service)
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rag-api
            test_dir: tests/unit/rag
            requirements: services/rag-api/requirements.txt
          - name: quota-service
            test_dir: tests/unit/quota
            requirements: services/quota-service/requirements.txt
          - name: embedding-worker
            test_dir: tests/unit/embedder
            requirements: services/embedding-worker/requirements.txt
            # Install CPU torch before sentence-transformers to avoid the CUDA variant
            pre_install: "pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet"
          - name: bff
            test_dir: tests/unit/bff
            requirements: services/bff/requirements.txt
          - name: connectors
            test_dir: tests/unit/connectors
            requirements: services/connector-s3/requirements.txt
          - name: doc-processor
            test_dir: tests/unit/processor
            requirements: services/pipeline-operator/requirements.txt
          - name: pipeline-operator
            test_dir: tests/unit/operator
            requirements: services/pipeline-operator/requirements.txt
          - name: metadata-service
            test_dir: tests/unit/metadata
            requirements: services/metadata-service/requirements.txt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Pre-install (if needed)
        if: matrix.pre_install != ''
        run: ${{ matrix.pre_install }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r ${{ matrix.requirements }} --quiet

      - name: Run unit tests
        run: pytest ${{ matrix.test_dir }} -x --tb=short -q

  # ──────────────────────────────────────────────
  # Job 3 — Docker Build & Push (main branch only)
  #   Images are tagged with the commit SHA only.
  #   The :latest tag is NEVER pushed.
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - connector-s3
          - connector-nfs
          - doc-processor
          - embedding-worker
          - rag-api
          - quota-service
          - bff
          - pipeline-operator
          - metadata-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          # Only SHA tag — never :latest
          tags: ghcr.io/${{ github.repository_owner }}/ai-data-pipeline/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 4 — Trivy CRITICAL CVE Gate
  #   Fails the pipeline if any CRITICAL CVE with
  #   an available fix is found in a built image.
  # ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy CVE Gate — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - connector-s3
          - connector-nfs
          - doc-processor
          - embedding-worker
          - rag-api
          - quota-service
          - bff
          - pipeline-operator
          - metadata-service
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gate step: exits 1 on any fixable CRITICAL CVE
      - name: Trivy scan (table — CVE gate)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/ai-data-pipeline/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      # Upload SARIF for GitHub Security tab (always runs so we get the report even on failure)
      - name: Trivy scan (SARIF — upload)
        if: always()
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/ai-data-pipeline/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
