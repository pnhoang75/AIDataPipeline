server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to Kong/BFF (overridden by k8s env; here as fallback)
    location /api/ {
        proxy_pass http://bff.ai-pipeline.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: all unknown paths serve index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Silent SSO iframe for OIDC
    location /silent-check-sso.html {
        add_header Cache-Control "no-cache, no-store";
    }
}
