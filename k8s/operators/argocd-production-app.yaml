# ArgoCD Application — production environment
# Images are promoted manually from staging via git commit.
# Rollback: git revert the image tag commit → ArgoCD syncs → Pipeline Operator
# runs the coordinated downgrade sequence.
#
# To promote staging image tags to production:
#   scripts/promote-to-production.sh <COMMIT_SHA>
#
# NOTE: :latest tag is blocked in production by the K8sBlockLatestImageTag
# Gatekeeper constraint (see k8s/operators/gatekeeper/constraints.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-pipeline-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pnhoang75/AIDataPipeline.git
    targetRevision: main
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-pipeline
  syncPolicy:
    # Production: no automated sync — changes are reviewed before ArgoCD applies them
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
