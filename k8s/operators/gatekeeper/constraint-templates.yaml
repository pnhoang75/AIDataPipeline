        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequireresourcelimits
spec:
  crd:
    spec:
      names:
        kind: K8sRequireResourceLimits
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequireresourcelimits

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.cpu
          msg := sprintf("container <%v> must set resources.limits.cpu", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.memory
          msg := sprintf("container <%v> must set resources.limits.memory", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not container.resources.limits.cpu
          msg := sprintf("initContainer <%v> must set resources.limits.cpu", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not container.resources.limits.memory
          msg := sprintf("initContainer <%v> must set resources.limits.memory", [container.name])
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocklatestimagetag
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLatestImageTag
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblocklatestimagetag

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          image_has_latest_tag(container.image)
          msg := sprintf("container <%v> must not use :latest image tag (image: %v)", [container.name, container.image])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          image_has_latest_tag(container.image)
          msg := sprintf("initContainer <%v> must not use :latest image tag (image: %v)", [container.name, container.image])
        }

        image_has_latest_tag(image) {
          endswith(image, ":latest")
        }

        image_has_latest_tag(image) {
          not contains(image, ":")
        }
