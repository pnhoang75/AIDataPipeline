---
# nginx ConfigMap — proxies port 80 on the control-plane node to the Kong proxy ClusterIP.
# Mirrors the same hostPort pattern used for Keycloak (k8s/operators/keycloak/hostport-proxy.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-nginx-conf
  namespace: kong
  labels:
    app: kong-proxy
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      server {
        listen 80;
        location / {
          proxy_pass         http://kong-kong-proxy.kong.svc.cluster.local:80;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_read_timeout 60s;
          proxy_connect_timeout 5s;
        }
      }
    }
---
# Pod that binds hostPort 80 on the control-plane node so that
# `curl http://localhost/v1/query` on the host reaches Kong.
apiVersion: v1
kind: Pod
metadata:
  name: kong-hostport-proxy
  namespace: kong
  labels:
    app: kong-hostport-proxy
spec:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
          hostPort: 80
      volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "100m"
  volumes:
    - name: nginx-conf
      configMap:
        name: kong-nginx-conf
