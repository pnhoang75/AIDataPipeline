---
# ConfigMap holding the Lua source for the custom quota-check Kong plugin.
# Mounted into the Kong container at the plugin path so Kong loads it on startup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-quota-check-plugin
  namespace: kong
  labels:
    app: kong
data:
  schema.lua: |
    local typedefs = require "kong.db.schema.typedefs"

    return {
      name = "quota-check",
      fields = {
        { consumer = typedefs.no_consumer },
        {
          config = {
            type = "record",
            fields = {
              {
                host = {
                  type = "string",
                  default = "quota-service.ai-pipeline.svc.cluster.local",
                },
              },
              {
                port = {
                  type = "integer",
                  default = 50051,
                  between = { 1, 65535 },
                },
              },
              {
                timeout_ms = {
                  type = "integer",
                  default = 100,
                  between = { 1, 5000 },
                },
              },
            },
          },
        },
      },
    }

  handler.lua: |
    -- Quota-check Kong plugin (session 2-B).
    -- Makes a gRPC unary CheckQuota call to the Quota Service with a 100 ms
    -- socket timeout. Any connection / protocol error is treated as fail-open
    -- so that Quota Service downtime does not block requests.
    -- Full gRPC framing wired in session 2-F when the Quota Service is deployed.

    local QuotaCheck = {
      PRIORITY = 850,   -- runs after jwt (990) and pre-function (999)
      VERSION  = "0.1.0",
    }

    -- Minimal HTTP/2 connection preface (client magic + SETTINGS frame).
    local H2_CLIENT_PREFACE = "PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n"
    -- Empty SETTINGS frame  (type=0x4, flags=0x0, stream_id=0, length=0)
    local H2_SETTINGS_FRAME = "\x00\x00\x00\x04\x00\x00\x00\x00\x00"

    local function encode_varint(n)
      local bytes = {}
      while n > 0x7f do
        bytes[#bytes + 1] = string.char(bit.bor(bit.band(n, 0x7f), 0x80))
        n = bit.rshift(n, 7)
      end
      bytes[#bytes + 1] = string.char(n)
      return table.concat(bytes)
    end

    -- Build a minimal serialised CheckQuotaRequest protobuf:
    --   field 1 (tenant_id) = string
    --   field 2 (metric)    = string "api_calls"
    local function build_check_quota_proto(tenant_id)
      local f1_tag   = "\x0a"                       -- field 1, wire type 2 (length-delimited)
      local f1_val   = encode_varint(#tenant_id) .. tenant_id
      local f2_tag   = "\x12"                       -- field 2, wire type 2
      local f2_str   = "api_calls"
      local f2_val   = encode_varint(#f2_str) .. f2_str
      return f1_tag .. f1_val .. f2_tag .. f2_val
    end

    -- Wrap raw proto bytes in a gRPC data frame (5-byte length-prefix).
    local function grpc_frame(proto_bytes)
      local len = #proto_bytes
      -- compressed flag (0) + 4-byte big-endian length
      return string.char(0,
        bit.band(bit.rshift(len, 24), 0xff),
        bit.band(bit.rshift(len, 16), 0xff),
        bit.band(bit.rshift(len,  8), 0xff),
        bit.band(len, 0xff)
      ) .. proto_bytes
    end

    function QuotaCheck:access(conf)
      local tenant_id = kong.request.get_header("X-Tenant-ID")
      if not tenant_id or tenant_id == "" then
        -- No tenant context — upstream will reject anyway; fail-open here.
        kong.log.warn("quota-check: missing X-Tenant-ID header, skipping check (fail-open)")
        return
      end

      local ok, err = pcall(function()
        local sock = ngx.socket.tcp()
        sock:settimeout(conf.timeout_ms)

        local connected, conn_err = sock:connect(conf.host, conf.port)
        if not connected then
          -- Quota Service not reachable → fail-open.
          -- TODO (session 2-F): alert/metric on repeated failures.
          kong.log.warn("quota-check: connect to quota-service failed (fail-open): ", tostring(conn_err))
          return
        end

        -- Send HTTP/2 client preface so the server can identify the protocol.
        local _, send_err = sock:send(H2_CLIENT_PREFACE .. H2_SETTINGS_FRAME)
        if send_err then
          kong.log.warn("quota-check: send preface failed (fail-open): ", tostring(send_err))
          sock:close()
          return
        end

        -- TODO (session 2-F): send full HEADERS + DATA frames for the
        --   quota.v1.QuotaService/CheckQuota unary RPC and parse the response.
        --   For now we only establish the connection to confirm reachability.
        sock:close()
      end)

      if not ok then
        kong.log.warn("quota-check: unexpected error (fail-open): ", tostring(err))
      end

      -- Fail-open: if quota service is unavailable we still let the request through.
      -- Actual quota enforcement (429) added in session 2-F.
    end

    return QuotaCheck
