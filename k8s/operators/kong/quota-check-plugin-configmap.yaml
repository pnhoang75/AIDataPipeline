---
# ConfigMap holding the Lua source for the custom quota-check Kong plugin.
# Mounted into the Kong container at the plugin path so Kong loads it on startup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-quota-check-plugin
  namespace: kong
  labels:
    app: kong
data:
  schema.lua: |
    local typedefs = require "kong.db.schema.typedefs"

    return {
      name = "quota-check",
      fields = {
        { consumer = typedefs.no_consumer },
        {
          config = {
            type = "record",
            fields = {
              {
                host = {
                  type = "string",
                  default = "quota-service.ai-pipeline.svc.cluster.local",
                },
              },
              {
                port = {
                  type = "integer",
                  default = 50051,
                  between = { 1, 65535 },
                },
              },
              {
                http_port = {
                  type = "integer",
                  default = 8080,
                  between = { 1, 65535 },
                },
              },
              {
                timeout_ms = {
                  type = "integer",
                  default = 100,
                  between = { 1, 5000 },
                },
              },
            },
          },
        },
      },
    }

  handler.lua: |
    -- Quota-check Kong plugin (session 2-F).
    -- Makes an HTTP/1.1 POST to the Quota Service /v1/check-quota endpoint.
    -- Returns 429 when the service responds with status="DENIED".
    -- Fails open on any connection or protocol error so Quota Service downtime
    -- does not block legitimate requests.

    local QuotaCheck = {
      PRIORITY = 850,   -- runs after jwt (990) and pre-function (999)
      VERSION  = "0.2.0",
    }

    function QuotaCheck:access(conf)
      local tenant_id = kong.request.get_header("X-Tenant-ID")
      if not tenant_id or tenant_id == "" then
        kong.log.warn("quota-check: missing X-Tenant-ID header, skipping check (fail-open)")
        return
      end

      local ok, http_lib = pcall(require, "resty.http")
      if not ok then
        kong.log.warn("quota-check: resty.http not available, fail-open")
        return
      end

      local httpc = http_lib.new()
      httpc:set_timeout(conf.timeout_ms)

      local body = '{"tenant_id":"' .. tenant_id
                .. '","metric":"API_CALLS_PER_DAY","amount":1}'
      local url = "http://" .. conf.host .. ":" .. tostring(conf.http_port)
               .. "/v1/check-quota"

      local res, err = httpc:request_uri(url, {
        method  = "POST",
        body    = body,
        headers = { ["Content-Type"] = "application/json" },
      })

      if not res then
        kong.log.warn("quota-check: request to quota-service failed (fail-open): ",
                      tostring(err))
        return
      end

      if res.status ~= 200 then
        kong.log.warn("quota-check: unexpected HTTP status ", res.status, " (fail-open)")
        return
      end

      local ok2, data = pcall(require("cjson").decode, res.body)
      if not ok2 or not data then
        kong.log.warn("quota-check: failed to parse response (fail-open)")
        return
      end

      if data.status == "DENIED" then
        return kong.response.exit(429, {
          message     = "quota_exceeded",
          detail      = data.deny_reason or "Daily API call quota exhausted",
          current     = data.current_usage,
          limit       = data.limit,
        })
      end
    end

    return QuotaCheck
