apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-nginx-conf
  namespace: keycloak
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;
        location / {
          proxy_pass http://keycloak-service.keycloak.svc.cluster.local:8080;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: keycloak-hostport-proxy
  namespace: keycloak
  labels:
    app: keycloak-hostport-proxy
spec:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 8080
          hostPort: 8080
      volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "100m"
  volumes:
    - name: nginx-conf
      configMap:
        name: keycloak-nginx-conf
