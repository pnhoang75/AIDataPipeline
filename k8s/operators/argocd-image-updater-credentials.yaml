# Registry pull secret for ArgoCD Image Updater → ghcr.io
# Create with:
#   kubectl create secret docker-registry ghcr-credentials \
#     -n argocd \
#     --docker-server=ghcr.io \
#     --docker-username=<github-actor> \
#     --docker-password=<GITHUB_TOKEN>
#
# Or seal with kubeseal for GitOps:
#   kubectl create secret docker-registry ghcr-credentials -n argocd \
#     --docker-server=ghcr.io --docker-username=<actor> --docker-password=<token> \
#     --dry-run=client -o yaml | kubeseal -o yaml > k8s/operators/argocd-ghcr-credentials-sealed.yaml
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-credentials
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-image-updater
type: kubernetes.io/dockerconfigjson
data:
  # Base64-encoded .dockerconfigjson — replace with actual value or use SealedSecret
  .dockerconfigjson: REPLACE_WITH_BASE64_DOCKERCONFIGJSON
