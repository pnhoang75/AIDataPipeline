---
# Self-signed bootstrap issuer — used only to sign the pipeline CA cert.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-ca
spec:
  selfSigned: {}
---
# Pipeline CA certificate signed by the selfsigned-ca issuer.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pipeline-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: ai-pipeline-ca
  secretName: pipeline-ca-tls
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
# Pipeline CA issuer — used by all services to obtain signed certificates.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: pipeline-ca-issuer
spec:
  ca:
    secretName: pipeline-ca-tls
