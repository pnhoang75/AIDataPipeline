# External Secrets Operator — ClusterSecretStore + ExternalSecrets
#
# Backend: AWS Secrets Manager (production).
# The ClusterSecretStore reads AWS credentials from an in-cluster Secret
# (aws-eso-credentials in infrastructure namespace), created out-of-band
# by the platform team and sealed via Sealed Secrets for GitOps safety.
#
# For testbed use, replace ClusterSecretStore provider.aws with provider.fake
# to inject test values without an AWS account.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-eso-credentials
            namespace: infrastructure
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-eso-credentials
            namespace: infrastructure
            key: secret-access-key
---
# Pipeline core secrets: PostgreSQL DSN, Redis URL, MinIO credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pipeline-secrets-eso
  namespace: ai-pipeline
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: pipeline-secrets          # Kubernetes Secret name created/synced
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: DB_DSN
      remoteRef:
        key: ai-pipeline/production/pipeline-secrets
        property: db_dsn
    - secretKey: REDIS_URL
      remoteRef:
        key: ai-pipeline/production/pipeline-secrets
        property: redis_url
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: ai-pipeline/production/pipeline-secrets
        property: minio_access_key
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: ai-pipeline/production/pipeline-secrets
        property: minio_secret_key
    - secretKey: MILVUS_TOKEN
      remoteRef:
        key: ai-pipeline/production/pipeline-secrets
        property: milvus_token
---
# Keycloak admin credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin-secret-eso
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: keycloak-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: KEYCLOAK_ADMIN
      remoteRef:
        key: ai-pipeline/production/keycloak
        property: admin_username
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: ai-pipeline/production/keycloak
        property: admin_password
---
# Kong admin token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kong-admin-token-eso
  namespace: ai-pipeline
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: kong-admin-token
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: KONG_ADMIN_TOKEN
      remoteRef:
        key: ai-pipeline/production/kong
        property: admin_token
---
# MinIO root credentials (for tenant provisioning)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-root-creds-eso
  namespace: infrastructure
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: minio-root-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: ai-pipeline/production/minio
        property: root_user
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: ai-pipeline/production/minio
        property: root_password
