apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: quota-db
  namespace: infrastructure
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  storage:
    size: 10Gi
  postgresql:
    shared_preload_libraries:
      - pgaudit
    parameters:
      pgaudit.log: "write,ddl"
  resources:
    requests:
      cpu: "250m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi
  backup:
    barmanObjectStore:
      destinationPath: s3://pipeline-backups/cnpg/
      endpointURL: http://minio.infrastructure.svc:80
      s3Credentials:
        accessKeyId:
          name: minio-creds
          key: ACCESS_KEY
        secretAccessKey:
          name: minio-creds
          key: SECRET_KEY
    retentionPolicy: 7d
  monitoring:
    enablePodMonitor: true
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: quota-db-daily
  namespace: infrastructure
spec:
  schedule: "0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: quota-db
