---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-api
  namespace: ai-pipeline
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: ai-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      serviceAccountName: rag-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rag-api
          image: ai-pipeline/rag-api:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MILVUS_HOST
              value: "milvus-milvus.infrastructure.svc.cluster.local"
            - name: MILVUS_PORT
              value: "19530"
            - name: REDIS_HOST
              value: "redis.infrastructure.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: EMBEDDING_BACKEND
              value: "local-cpu"
            - name: EMBEDDING_MODEL
              value: "BAAI/bge-small-en-v1.5"
            - name: EMBEDDING_DIM
              value: "384"
            - name: CB_FAILURE_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: CB_MILVUS_RAG_FAILURE_THRESHOLD
            - name: CB_RECOVERY_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: CB_MILVUS_RAG_RECOVERY_TIMEOUT_SEC
            - name: CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_QUERY_CACHE_TTL_SEC
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_BOOTSTRAP
            - name: KAFKA_USAGE_TOPIC
              value: "usage-events"
            - name: SENTENCE_TRANSFORMERS_HOME
              value: "/tmp/st-models"
            - name: HF_HOME
              value: "/tmp/st-models"
            - name: HF_HUB_CACHE
              value: "/tmp/st-models/hub"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: ai-pipeline
  labels:
    app: rag-api
spec:
  selector:
    app: rag-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rag-api-egress
  namespace: ai-pipeline
spec:
  podSelector:
    matchLabels:
      app: rag-api
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infrastructure
      ports:
        - port: 19530
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 9092
          protocol: TCP
    # Allow HTTPS for HuggingFace model download on first startup
    - ports:
        - port: 443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rag-api-ingress
  namespace: ai-pipeline
spec:
  podSelector:
    matchLabels:
      app: rag-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
