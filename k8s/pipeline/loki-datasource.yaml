---
# Grafana datasource ConfigMap for Loki.
# Grafana (deployed by kube-prometheus-stack) auto-loads datasources from
# ConfigMaps in its namespace that carry the label grafana_datasource: "1".
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 5000
          derivedFields:
            - name: TraceID
              matcherRegex: '"trace_id":"([a-f0-9]{32})"'
              url: http://tempo.monitoring.svc.cluster.local:3100/trace/$${__value.raw}
              datasourceUid: tempo
