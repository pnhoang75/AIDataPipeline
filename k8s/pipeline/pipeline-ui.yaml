---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-ui
  namespace: ai-pipeline
  labels:
    app: pipeline-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline-ui
  template:
    metadata:
      labels:
        app: pipeline-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user in nginx:alpine
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: nginx
          image: pipeline-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # nginx writes to /var/cache/nginx and /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pipeline-ui
  namespace: ai-pipeline
spec:
  selector:
    app: pipeline-ui
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline-ui
  namespace: ai-pipeline
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pipeline-ui
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pipeline-ui-allow
  namespace: ai-pipeline
spec:
  podSelector:
    matchLabels:
      app: pipeline-ui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 80
  egress:
    - ports:
        - port: 8000   # BFF
        - port: 8080   # Keycloak
        - port: 53     # DNS
          protocol: UDP
