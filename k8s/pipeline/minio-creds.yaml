apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: infrastructure
type: Opaque
stringData:
  # MinIO Operator 5.x uses config.env for tenant configuration
  config.env: |
    export MINIO_ROOT_USER=minio
    export MINIO_ROOT_PASSWORD=minio123456
  # Separate keys for CNPG barman backup credentials
  ACCESS_KEY: "minio"
  SECRET_KEY: "minio123456"
