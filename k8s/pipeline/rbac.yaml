# Base ServiceAccounts and non-connector Roles.
#
# connector-sa does NOT have a static shared Role for secrets — the Pipeline
# Operator creates one per-connector Role with an exact resourceName (no
# wildcards).  See services/pipeline-operator/operator/rbac.py.
---
# ── connector-sa ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: connector-sa
  namespace: ai-pipeline
automountServiceAccountToken: false
---
# connector-sa: read-only access to the shared pipeline-config ConfigMap only.
# Per-connector secret access is granted via individual Roles created by the
# Pipeline Operator at DataConnector reconcile time.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: connector-configmap-role
  namespace: ai-pipeline
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["pipeline-config"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: connector-configmap-rb
  namespace: ai-pipeline
subjects:
  - kind: ServiceAccount
    name: connector-sa
    namespace: ai-pipeline
roleRef:
  kind: Role
  name: connector-configmap-role
  apiGroup: rbac.authorization.k8s.io
---
