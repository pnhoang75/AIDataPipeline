# ── pipeline-operator-sa ──────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-operator-sa
  namespace: ai-pipeline
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-operator-role
  namespace: ai-pipeline
rules:
  - apiGroups: [""]
    resources: ["configmaps", "services", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkatopics", "kafkausers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["ai-pipeline.io"]
    resources: ["dataconnectors", "dataconnectors/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-operator-rb
  namespace: ai-pipeline
subjects:
  - kind: ServiceAccount
    name: pipeline-operator-sa
    namespace: ai-pipeline
roleRef:
  kind: Role
  name: pipeline-operator-role
  apiGroup: rbac.authorization.k8s.io
