apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: redis-standalone
  namespace: infrastructure
spec:
  sentinel:
    replicas: 3  # quorum requires ≥ 3 sentinels for reliable failover
    resources:
      requests:
        cpu: "50m"
        memory: 64Mi
      limits:
        cpu: "100m"
        memory: 128Mi
  redis:
    replicas: 3  # 1 primary + 2 replicas for HA
    storage:
      persistentVolumeClaim:
        metadata:
          name: redis-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: "100m"
        memory: 128Mi
      limits:
        cpu: "250m"
        memory: 256Mi
