---
# Milvus standalone — testbed deployment via Milvus Operator 0.9
# Uses in-cluster etcd and in-cluster MinIO (operator-managed) for simplicity.
# Fix: override MINIO_PORT env var (Kubernetes auto-injects tcp://IP:PORT from the "minio" service
# in the same namespace, which Milvus reads and prepends "http://" causing "Endpoint url cannot
# have fully qualified paths" in the AWS SDK chunk manager.)
apiVersion: milvus.io/v1beta1
kind: Milvus
metadata:
  name: milvus
  namespace: infrastructure
spec:
  mode: standalone
  config:
    minio:
      address: milvus-minio.infrastructure
      port: 9000
      useSSL: false
      bucketName: milvus-bucket
      rootPath: ""
      useIAM: false
      iamEndpoint: ""
      cloudProvider: minio
  dependencies:
    etcd:
      inCluster:
        values:
          replicaCount: 1
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          persistence:
            enabled: false
    storage:
      inCluster:
        values:
          mode: standalone
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
          persistence:
            enabled: false
  components:
    standalone:
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
      env:
        - name: MINIO_PORT
          value: "9000"
        - name: MINIO_ADDRESS
          value: "milvus-minio.infrastructure"
