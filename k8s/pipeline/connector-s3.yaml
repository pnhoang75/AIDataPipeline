---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: connector-s3
  namespace: ai-pipeline
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector-s3
  namespace: ai-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connector-s3
  template:
    metadata:
      labels:
        app: connector-s3
    spec:
      serviceAccountName: connector-s3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: connector-s3
          image: ai-pipeline/connector-s3:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_BOOTSTRAP
            - name: KAFKA_PRODUCE_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_PRODUCE_TIMEOUT_MS
            - name: REDIS_CONNECT_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_CONNECT_TIMEOUT_MS
            - name: REDIS_OP_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_OP_TIMEOUT_MS
            - name: MINIO_ENDPOINT
              value: "minio.infrastructure.svc.cluster.local:80"
            - name: MINIO_SECURE
              value: "false"
            - name: MINIO_BUCKET
              value: "documents"
            - name: REDIS_URL
              value: "redis://redis.infrastructure.svc.cluster.local:6379/0"
            - name: CONNECTOR_ID
              value: "connector-s3-default"
            - name: TENANT_ID
              value: "default"
            - name: POLL_INTERVAL_SECONDS
              value: "15"
            - name: KAFKA_TOPIC
              value: "raw-documents"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: pipeline-secrets
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: tmp
          emptyDir: {}
        - name: pipeline-secrets
          secret:
            secretName: pipeline-secrets
            items:
              - key: MINIO_ACCESS_KEY
                path: minio-access-key
              - key: MINIO_SECRET_KEY
                path: minio-secret-key
              - key: POSTGRES_DSN
                path: postgres-dsn
---
apiVersion: v1
kind: Service
metadata:
  name: connector-s3
  namespace: ai-pipeline
  labels:
    app: connector-s3
spec:
  selector:
    app: connector-s3
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: connector-s3
  namespace: ai-pipeline
spec:
  podSelector:
    matchLabels:
      app: connector-s3
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infrastructure
      ports:
        - port: 9092
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 9000
          protocol: TCP
