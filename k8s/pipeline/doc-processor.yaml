---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: doc-processor
  namespace: ai-pipeline
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-processor
  namespace: ai-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doc-processor
  template:
    metadata:
      labels:
        app: doc-processor
    spec:
      serviceAccountName: doc-processor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: doc-processor
          image: ai-pipeline/doc-processor:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_BOOTSTRAP
            - name: KAFKA_PRODUCE_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_PRODUCE_TIMEOUT_MS
            - name: KAFKA_MAX_POLL_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_MAX_POLL_INTERVAL_MS
            - name: KAFKA_SESSION_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_SESSION_TIMEOUT_MS
            - name: CHUNK_SIZE_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: CHUNK_SIZE_TOKENS
            - name: CHUNK_OVERLAP_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: CHUNK_OVERLAP_TOKENS
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: pipeline-secrets
                  key: POSTGRES_DSN
            - name: KAFKA_INPUT_TOPIC
              value: "raw-documents"
            - name: KAFKA_OUTPUT_TOPIC
              value: "document-chunks"
            - name: KAFKA_DLQ_TOPIC
              value: "dlq-raw-documents"
            - name: KAFKA_CONSUMER_GROUP
              value: "doc-processor"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: doc-processor
  namespace: ai-pipeline
spec:
  podSelector:
    matchLabels:
      app: doc-processor
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infrastructure
      ports:
        - port: 9092
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 9000
          protocol: TCP
