---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metadata-service
  namespace: ai-pipeline
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-service
  namespace: ai-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metadata-service
  template:
    metadata:
      labels:
        app: metadata-service
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      serviceAccountName: metadata-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metadata-service
          image: ai-pipeline/metadata-service:latest
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pipeline-secrets
                  key: METADATA_DATABASE_URL
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: KAFKA_BOOTSTRAP
            - name: KAFKA_CONSUMER_GROUP
              value: "metadata-service"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: metadata-service
  namespace: ai-pipeline
  labels:
    app: metadata-service
spec:
  selector:
    app: metadata-service
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metadata-service-egress
  namespace: ai-pipeline
spec:
  podSelector:
    matchLabels:
      app: metadata-service
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infrastructure
      ports:
        - port: 5432
          protocol: TCP
        - port: 9092
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metadata-service-ingress
  namespace: ai-pipeline
spec:
  podSelector:
    matchLabels:
      app: metadata-service
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
