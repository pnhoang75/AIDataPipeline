  namespace: infrastructure
  labels:
    strimzi.io/cluster: ai-pipeline-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: "1209600000"  # 14 days
    segment.bytes: "104857600"
---
# dlq-document-chunks: 1 partition, 14-day retention — failed embedding
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: dlq-document-chunks
  namespace: infrastructure
  labels:
    strimzi.io/cluster: ai-pipeline-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: "1209600000"  # 14 days
    segment.bytes: "104857600"
---
# metadata-events: 4 partitions, 7-day retention — DataSource/lineage events
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: metadata-events
  namespace: infrastructure
  labels:
    strimzi.io/cluster: ai-pipeline-kafka
